name: Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  speed-report:
    name: Speed report
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[benchmark]

      - name: Run speed report
        env:
          MPLBACKEND: Agg
        run: |
          python scripts/speed_report.py -n 10 --full --quiet --plot --output static_report.pdf | tee static_benchmark.log

      - name: Run dynamic speed report
        env:
          MPLBACKEND: Agg
        run: |
          python scripts/speed_report.py -n 10 --full --quiet --dynamic --plot --output dynamic_report.pdf | tee dynamic_benchmark.log

      - name: Run memory benchmark
        env:
          MPLBACKEND: Agg
        run: |
          python scripts/speed_report.py --memory --quiet | tee memory_benchmark.log

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: speed-report
          path: |
            static_benchmark.log
            dynamic_benchmark.log
            memory_benchmark.log
            static_report.pdf
            dynamic_report.pdf
